# Render Blueprint — https://render.com/docs/blueprint-spec
# After deploy, copy the service URL into Frontend/ApplicationTracker/vercel.json
services:
  - type: web
    name: application-tracker-api
    runtime: docker
    rootDir: Backend/ApplicationTracker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: APP_SEED_DEMO_USER
        value: false
      - key: SERVER_PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: 20
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: 60
