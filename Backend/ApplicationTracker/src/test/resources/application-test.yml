spring:
  datasource:
    url: jdbc:h2:mem:application_tracker;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

app:
  seed-demo-user: false
  rate-limit:
    auth-max-requests: 20
    auth-window-seconds: 60
  jwt:
    secret: test-secret-key-for-integration-tests-min-32-chars
