server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: application-tracker-api
  lifecycle:
    timeout-per-shutdown-phase: 30s
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:application_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 25
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-long-random-secret-at-least-256-bits}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    remember-me-refresh-expiration-ms: ${JWT_REMEMBER_ME_REFRESH_EXPIRATION_MS:2592000000}
  seed-demo-user: ${APP_SEED_DEMO_USER:true}
  rate-limit:
    auth-max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:20}
    auth-window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}

logging:
  level:
    org.springframework.security: INFO
    com.applicationtracker: INFO
