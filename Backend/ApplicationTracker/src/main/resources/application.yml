server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: application-tracker-api
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:application_tracker}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  jwt:
    secret: ${JWT_SECRET:change-me-use-a-long-random-secret-at-least-256-bits}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:3600000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
    remember-me-refresh-expiration-ms: ${JWT_REMEMBER_ME_REFRESH_EXPIRATION_MS:2592000000}
  password-reset:
    expiration-ms: ${PASSWORD_RESET_EXPIRATION_MS:3600000}

logging:
  level:
    org.springframework.security: INFO
    com.applicationtracker: DEBUG
