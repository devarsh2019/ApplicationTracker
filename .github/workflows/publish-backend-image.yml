name: Publish Backend Docker Image

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'Backend/ApplicationTracker/**'
      - '.github/workflows/publish-backend-image.yml'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Backend/ApplicationTracker
          push: true
          tags: |
            ghcr.io/devarsh2019/application-tracker-api:latest
            ghcr.io/devarsh2019/application-tracker-api:${{ github.sha }}
